    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: coral;
            display: inline-block;
            align-items: center;
            text-align: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            margin-left: 40px;
        }
        .box {
            animation: fadeUp linear;
            animation-timeline: view();
            animation-range: entry 0% cover 40%;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.5);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
